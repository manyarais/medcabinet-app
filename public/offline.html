<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F7F5F0" />
    <title>Pillio — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #f7f5f0;
        color: #1a1f1c;
        padding: 1.5rem;
        text-align: center;
      }
      h1 {
        font-size: 1.35rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        color: #5c6560;
        line-height: 1.45;
        max-width: 22rem;
      }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        color: #2f6b4f;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        Open Pillio while online once so we can save your cabinet and today’s
        doses. Then this page will load from cache.
      </p>
      <a href="/">Try home</a>
    </main>
  </body>
</html>
